<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>🐱 TyCat — уютная забота</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Nunito', 'Comfortaa', sans-serif;
      background: radial-gradient(circle at 20% 20%, #1e3b4f, #0b1b2b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Фоновые эмодзи */
    .bg-emoji {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      user-select: none;
    }

    /* Листопад */
    .leaf {
      position: absolute;
      top: -60px;
      width: 30px;
      height: 30px;
      background: radial-gradient(circle at 30% 30%, #f9e076, #c97e2c);
      clip-path: polygon(0% 0%, 100% 10%, 80% 100%, 20% 90%);
      opacity: 0.7;
      animation: leafFall linear infinite;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes leafFall {
      0% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 0.8;
      }
      100% {
        transform: translate(40px, 110vh) rotate(360deg);
        opacity: 0.1;
      }
    }

    /* Экран приветствия */
    .intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a121f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
    }

    .intro-cat {
      font-size: 8rem;
      animation: spinGrow 1.2s ease-out forwards;
    }

    @keyframes spinGrow {
      0% { transform: scale(0) rotate(0deg); opacity: 0; }
      50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
      100% { transform: scale(1) rotate(360deg); opacity: 1; }
    }

    .tycat-text {
      font-size: 4rem;
      font-weight: bold;
      color: #fadf9f;
      text-shadow: 0 0 25px #ffb347;
      margin-top: 20px;
      letter-spacing: 6px;
    }

    .welcome-sub {
      color: #c0daf5;
      font-size: 1.5rem;
      margin-top: 15px;
    }

    .game-container {
      width: 100%;
      max-width: 780px;
      background: rgba(18, 30, 41, 0.75);
      backdrop-filter: blur(22px);
      border-radius: 70px 70px 55px 55px;
      padding: 20px 25px 35px;
      box-shadow: 0 35px 55px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.2);
      border: 1px solid rgba(255, 255, 255, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 15;
      transition: all 0.3s;
    }

    .promo-button {
      position: absolute;
      top: 15px;
      right: 20px;
      background: linear-gradient(135deg, #ffd966, #b8863c);
      border: none;
      border-radius: 40px;
      padding: 8px 18px;
      font-weight: bold;
      color: #231f1a;
      box-shadow: 0 5px 0 #5e3e1a;
      cursor: pointer;
      font-size: 1rem;
      z-index: 30;
      transition: 0.1s;
    }
    .promo-button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #5e3e1a;
    }

    h1 {
      color: #f7e3c0;
      text-shadow: 0 5px 15px #00000070;
      font-size: 2.5rem;
      margin: 5px 0 10px;
    }

    .cat-area {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 130px;
      padding: 20px 35px 10px;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bed-area {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .cat-emoji {
      font-size: 7rem;
      filter: drop-shadow(0 15px 15px #000000b0);
    }

    .stats {
      display: flex;
      gap: 20px;
      background: #1f3a4f;
      border-radius: 40px;
      padding: 12px 25px;
      color: #f5e1b9;
      font-weight: bold;
    }

    .btn {
      background: radial-gradient(circle at 30% 30%, #ffe5b9, #b87c3a);
      border: none;
      padding: 14px 24px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.1rem;
      box-shadow: 0 8px 0 #5a3e1c, 0 10px 20px black;
      cursor: pointer;
      transition: 0.07s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #5a3e1c;
    }

    .view {
      display: none;
      width: 100%;
    }
    .active-view {
      display: block;
    }

    .game-field {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px auto;
      max-width: 330px;
      background: #6b4f32;
      padding: 25px;
      border-radius: 90px;
    }

    .hole {
      background: #3b2b1a;
      border-radius: 50%;
      aspect-ratio: 1;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: inset 0 10px 10px black;
    }

    .paw-active {
      background: #e3a869;
      box-shadow: 0 0 30px #ffbb4d;
    }

    .shop-items {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
    }

    .shop-card {
      background: #253e50;
      border-radius: 30px;
      padding: 18px;
      width: 140px;
      color: #f5e7d3;
    }
  </style>
</head>
<body>
<!-- Фоновые эмодзи -->
<div id="bgEmojis"></div>

<!-- Экран приветствия -->
<div class="intro-overlay" id="introScreen">
  <div class="intro-cat">🐈</div>
  <div class="tycat-text">TyCat</div>
  <div class="welcome-sub">🐾 Добро пожаловать! 🐾</div>
</div>

<div class="game-container" id="appContainer">
  <button class="promo-button" id="promoBtn">🎟️ Промокоды</button>
  <h1>🐱✨ Мур-р-р ✨🐱</h1>
  <div id="mainView" class="view active-view">
    <div class="cat-area">
      <div class="bed-area">
        <span class="cat-emoji" id="catEmoji">🐈</span>
        <span style="font-size:3rem;" id="bedDisplay"></span>
      </div>
    </div>
    <div class="stats">
      <span>🍗 <progress id="hungerProgress" value="80" max="100"></progress></span>
      <span>😊 <progress id="moodProgress" value="70" max="100"></progress></span>
      <span>💧 <progress id="thirstProgress" value="60" max="100"></progress></span>
    </div>
    <div style="font-size:1.8rem; margin:8px;">🪙 <span id="coinAmount">0</span></div>
    <div style="display:flex; gap:15px; flex-wrap:wrap; justify-content:center;">
      <button class="btn" id="playMiniGameBtn">🎮 Мини-игра</button>
      <button class="btn" id="openShopBtn">🏪 Магазин</button>
    </div>
  </div>

  <div id="gameView" class="view">
    <h2>🐾 Поймай лапку!</h2>
    <div style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap;">
      <button class="btn" data-diff="easy">🐣 Легко (3с)</button>
      <button class="btn" data-diff="medium">⚡ Средне (2.5с)</button>
      <button class="btn" data-diff="hard">🔥 Сложно (2с)</button>
      <button class="btn" data-diff="extreme">💀 Хардкор (1с)</button>
    </div>
    <div class="game-field" id="holeGrid"></div>
    <div style="font-size:1.2rem; margin:8px;">
      🐭 Поймано: <span id="catchCounter">0</span>/<span id="totalRequired">10</span> | ⏱️ <span id="timerDisplay">-</span>
    </div>
    <button class="btn" id="backFromGame">↩️ Назад</button>
  </div>

  <div id="shopView" class="view">
    <h2>🛍️ Магазин кота</h2>
    <div class="shop-items" id="shopContainer"></div>
    <button class="btn" id="backFromShop">↩️ Назад</button>
  </div>
</div>

<script>
  (function() {
    // Состояние
    const state = {
      coins: 0,
      hunger: 80,
      mood: 70,
      thirst: 60,
      ownedBed: null,
      currentFur: 'default',
    };

    const shopItems = [
      { id: 'bed_basic', name: '🧺 Лежанка', price: 80, type: 'bed', icon: '🧺' },
      { id: 'bed_royal', name: '👑 Королевская', price: 200, type: 'bed', icon: '🛏️' },
      { id: 'fur_orange', name: '🐈 Рыжий', price: 110, type: 'fur' },
      { id: 'fur_siamese', name: '🐱 Сиамский', price: 130, type: 'fur' },
      { id: 'fur_black', name: '🐈‍⬛ Чёрный', price: 120, type: 'fur' },
      { id: 'food', name: '🍗 Корм', price: 25, type: 'consumable', stat: 'hunger', value: 35 },
      { id: 'toy', name: '🧶 Игрушка', price: 30, type: 'consumable', stat: 'mood', value: 35 },
      { id: 'water', name: '💧 Вода', price: 20, type: 'consumable', stat: 'thirst', value: 40 }
    ];

    function updateUI() {
      document.getElementById('coinAmount').textContent = state.coins;
      document.getElementById('hungerProgress').value = state.hunger;
      document.getElementById('moodProgress').value = state.mood;
      document.getElementById('thirstProgress').value = state.thirst;
      const bedDiv = document.getElementById('bedDisplay');
      bedDiv.textContent = state.ownedBed === 'bed_basic' ? '🧺' : state.ownedBed === 'bed_royal' ? '🛏️' : '';
      const cat = document.getElementById('catEmoji');
      if (state.currentFur === 'orange') cat.textContent = '🐈';
      else if (state.currentFur === 'siamese') cat.textContent = '🐱';
      else if (state.currentFur === 'black') cat.textContent = '🐈‍⬛';
      else cat.textContent = '🐈';
    }

    setInterval(() => {
      state.hunger = Math.max(0, state.hunger - 0.7);
      state.mood = Math.max(0, state.mood - 0.5);
      state.thirst = Math.max(0, state.thirst - 0.8);
      updateUI();
    }, 3000);

    function showView(id) {
      ['mainView','gameView','shopView'].forEach(v => document.getElementById(v).classList.remove('active-view'));
      document.getElementById(id).classList.add('active-view');
    }

    function renderShop() {
      const container = document.getElementById('shopContainer');
      container.innerHTML = '';
      shopItems.forEach(item => {
        const owned = (item.type==='bed' && state.ownedBed===item.id) || (item.type==='fur' && state.currentFur===item.id);
        const card = document.createElement('div');
        card.className = 'shop-card';
        card.innerHTML = `<div style="font-size:2.5rem;">${item.icon||'🎁'}</div><strong>${item.name}</strong><br>💰${item.price}<br><button ${owned?'disabled':''}>${owned?'✅ Куплено':'Купить'}</button>`;
        card.querySelector('button').addEventListener('click', ()=>{
          if(state.coins < item.price) { alert('Недостаточно монет 😿'); return; }
          state.coins -= item.price;
          if(item.type==='bed') state.ownedBed = item.id;
          else if(item.type==='fur') state.currentFur = item.id;
          else if(item.type==='consumable') {
            if(item.stat==='hunger') state.hunger = Math.min(100, state.hunger+item.value);
            if(item.stat==='mood') state.mood = Math.min(100, state.mood+item.value);
            if(item.stat==='thirst') state.thirst = Math.min(100, state.thirst+item.value);
          }
          updateUI();
          renderShop();
        });
        container.appendChild(card);
      });
    }

    // Мини-игра
    let gameActive = false;
    let timeoutId = null;
    let catches = 0;
    let totalRequired = 10;
    let diffTime = 3000;
    let currentDifficulty = 'easy';

    function stopGame() { 
      gameActive = false; 
      clearTimeout(timeoutId); 
      document.querySelectorAll('.hole').forEach(h => h.classList.remove('paw-active')); 
    }

    function spawnPaw() {
      if (!gameActive || catches >= totalRequired) { 
        if (catches >= totalRequired) { 
          stopGame(); 
          let reward = 40;
          if (currentDifficulty === 'extreme') reward = 120;
          else if (currentDifficulty === 'hard') reward = 70;
          else if (currentDifficulty === 'medium') reward = 50;
          
          alert(`🎉 Поймано ${totalRequired} лапок! +${reward} монет 💰`);
          state.coins += reward; 
          updateUI();
          document.getElementById('timerDisplay').textContent = 'Победа!';
        } 
        return; 
      }
      
      document.querySelectorAll('.hole').forEach(h => h.classList.remove('paw-active'));
      const holes = document.querySelectorAll('.hole');
      const hole = holes[Math.floor(Math.random() * holes.length)];
      hole.classList.add('paw-active');
      
      document.getElementById('timerDisplay').textContent = (diffTime/1000).toFixed(1) + 'с';
      
      timeoutId = setTimeout(() => {
        if (gameActive && hole.classList.contains('paw-active')) {
          hole.classList.remove('paw-active');
          spawnPaw();
        }
      }, diffTime);
    }

    function startGame(diff) {
      stopGame();
      catches = 0;
      currentDifficulty = diff;
      
      if (diff === 'easy') { diffTime = 3000; totalRequired = 10; }
      else if (diff === 'medium') { diffTime = 2500; totalRequired = 10; }
      else if (diff === 'hard') { diffTime = 2000; totalRequired = 10; }
      else if (diff === 'extreme') { diffTime = 1000; totalRequired = 20; }
      
      document.getElementById('catchCounter').textContent = '0';
      document.getElementById('totalRequired').textContent = totalRequired;
      document.getElementById('timerDisplay').textContent = (diffTime/1000).toFixed(1) + 'с';
      
      gameActive = true;
      spawnPaw();
    }

    function buildHoles() {
      const grid = document.getElementById('holeGrid'); 
      grid.innerHTML = '';
      for (let i = 0; i < 9; i++) { 
        const d = document.createElement('div'); 
        d.className = 'hole'; 
        d.textContent = '🕳️'; 
        d.addEventListener('click', (e) => {
          if (!gameActive || !e.currentTarget.classList.contains('paw-active')) return;
          clearTimeout(timeoutId); 
          e.currentTarget.classList.remove('paw-active'); 
          catches++;
          document.getElementById('catchCounter').textContent = catches;
          
          if (catches >= totalRequired) { 
            stopGame(); 
            let reward = 40;
            if (currentDifficulty === 'extreme') reward = 120;
            else if (currentDifficulty === 'hard') reward = 70;
            else if (currentDifficulty === 'medium') reward = 50;
            
            alert(`🎯 Пойманы все ${totalRequired} лапок! +${reward} монет 💎`);
            state.coins += reward; 
            updateUI();
            document.getElementById('timerDisplay').textContent = 'Успех!';
          } else {
            spawnPaw();
          }
        }); 
        grid.appendChild(d); 
      }
    }

    // Звуковые эффекты
    function playSound(type){
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if(type==='water'){ osc.type='triangle'; osc.frequency.value=400; gain.gain.setValueAtTime(0.1,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4); osc.start(); osc.stop(ctx.currentTime+0.4); }
        else if(type==='game'){ osc.type='square'; osc.frequency.value=520; gain.gain.setValueAtTime(0.08,ctx.currentTime); osc.start(); osc.stop(ctx.currentTime+0.2); }
        else if(type==='shop'){ osc.type='sine'; osc.frequency.value=660; gain.gain.setValueAtTime(0.09,ctx.currentTime); osc.start(); osc.stop(ctx.currentTime+0.25); }
      }catch(e){}
    }

    // Эмодзи всплеск
    function emojiBurst(emoji, count=12){
      for(let i=0;i<count;i++){
        const span = document.createElement('span');
        span.textContent=emoji;
        span.style.position='fixed'; span.style.fontSize='2rem'; span.style.left=Math.random()*80+'%'; span.style.top='50%';
        span.style.transition='all 1s ease-out'; span.style.opacity='1'; span.style.zIndex='1000';
        document.body.appendChild(span);
        requestAnimationFrame(()=>{
          span.style.transform=`translate(${(Math.random()-0.5)*200}px, ${-200-Math.random()*150}px) rotate(${Math.random()*360}deg)`;
          span.style.opacity='0';
        });
        setTimeout(()=>span.remove(), 1000);
      }
    }

    // Промокод
    function applyPromo(code){
      if(code.toUpperCase()==='TIKTOK'){
        if(!sessionStorage.getItem('tiktok_used')){
          state.coins += 70; updateUI();
          sessionStorage.setItem('tiktok_used','1');
          alert('🎟️ Промокод TIKTOK активирован! +70 монет 💰\nВсе промокоды в TikTok: minizmik');
          emojiBurst('🎟️✨');
        } else { alert('Промокод уже использован 😺'); }
      } else { alert('Неверный промокод 😿\nПодсказка: TikTok minizmik'); }
    }

    // Листопад и фон
    function createLeaf(){
      const leaf=document.createElement('div'); leaf.className='leaf';
      leaf.style.left=Math.random()*100+'%'; leaf.style.animationDuration=(Math.random()*8+6)+'s';
      document.body.appendChild(leaf); setTimeout(()=>leaf.remove(),10000);
    }
    setInterval(createLeaf,600);
    for(let i=0;i<14;i++) setTimeout(createLeaf,i*150);
    
    function addBgEmojis(){
      const cont=document.getElementById('bgEmojis');
      const emojis=['🐾','🐈','✨','🍂','🌿','🐟','🧶','💧','🌟','🍁'];
      for(let i=0;i<25;i++){
        const e=document.createElement('div'); e.className='bg-emoji'; e.textContent=emojis[i%emojis.length];
        e.style.left=Math.random()*95+'%'; e.style.top=Math.random()*90+'%';
        cont.appendChild(e);
      }
    }
    addBgEmojis();

    // Интро
    window.addEventListener('load', ()=>{
      setTimeout(()=>{
        document.getElementById('introScreen').style.opacity='0';
        setTimeout(()=>{ document.getElementById('introScreen').style.display='none'; },800);
      }, 4200);
    });

    // Инициализация
    buildHoles(); updateUI(); renderShop();
    
    document.getElementById('playMiniGameBtn').addEventListener('click', ()=>{ 
      showView('gameView'); 
      stopGame(); 
      playSound('game'); 
      emojiBurst('🎮🐾'); 
    });
    
    document.getElementById('openShopBtn').addEventListener('click', ()=>{ 
      showView('shopView'); 
      renderShop(); 
      playSound('shop'); 
      emojiBurst('🛍️💎'); 
    });
    
    document.getElementById('backFromGame').addEventListener('click', ()=>{ 
      stopGame(); 
      showView('mainView'); 
    });
    
    document.getElementById('backFromShop').addEventListener('click', ()=>showView('mainView'));
    
    document.querySelectorAll('[data-diff]').forEach(b => b.addEventListener('click', (e) => startGame(e.currentTarget.dataset.diff)));
    
    document.getElementById('promoBtn').addEventListener('click', ()=>{
      const code = prompt('Введите промокод 🎟️\nВсе промокоды в TikTok: minizmik');
      if(code) applyPromo(code);
    });
  })();
</script>
</body>
</html>
